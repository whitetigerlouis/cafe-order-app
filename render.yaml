# Render Blueprint — 커피 주문 앱 (올인원 배포)
# 웹서비스(백엔드+프런트 서빙) 1개 + PostgreSQL 1개
# Render 대시보드 > Blueprints > New Blueprint Instance 에서 이 저장소를 선택하면 자동 구성됩니다.

databases:
  - name: coffee-order-db
    databaseName: coffee_order
    user: coffee
    plan: free

services:
  - type: web
    name: coffee-order-app
    runtime: node
    plan: free
    # 백엔드/프런트 의존성 설치 후 프런트 빌드
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    # 백엔드가 API + 프런트(dist)를 함께 서빙
    startCommand: node backend/src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coffee-order-db
          property: connectionString
      - key: NODE_ENV
        value: production
